<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Converter Pickup</title>
    <style>
        /* The Visuals: Dark mode with a massive, glowing action button */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #121212; 
            margin: 0;
            color: white;
        }
        .app-container {
            text-align: center;
            width: 100%;
            padding: 20px;
        }
        /* The Money Button */
        .pickup-btn {
            background-color: #ff3b30;
            color: white;
            border: none;
            border-radius: 50%;
            width: 280px;
            height: 280px;
            font-size: 36px;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 10px 40px rgba(255, 59, 48, 0.6);
            cursor: pointer;
            transition: transform 0.1s;
        }
        .pickup-btn:active {
            transform: scale(0.95); 
        }
        h1 { 
            font-size: 28px; 
            margin-bottom: 50px; 
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>CONVERTER PICKUP</h1>
        <button class="pickup-btn" id="mainButton">Request<br>Pickup</button>
        <p id="statusMessage" style="margin-top: 30px; font-size: 20px; color: #ff3b30; font-weight: bold;"></p>
    </div>

    <script>
        // The Engine: Grabs GPS and shoots you a text
        document.getElementById("mainButton").addEventListener("click", function() {
            const statusText = document.getElementById("statusMessage");
            statusText.style.color = "#ff3b30";
            statusText.innerText = "LOCATING...";

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    
                    // The text message they will send you
                    const message = "I have a converter for pickup! My exact location: https://maps.google.com/?q=" + lat + "," + lon;
                    
                    // PUT YOUR PHONE NUMBER HERE (No dashes, just the 10 digits)
                    const yourPhoneNumber = "14253279885"; 
                    
                    // Opens the phone's native texting app
                    window.location.href = "sms:" + yourPhoneNumber + "?body=" + encodeURIComponent(message);
                    
                    statusText.innerText = "TEXT APP OPENED!";
                    statusText.style.color = "#4cd964"; // Turns green on success
                    
                }, function(error) {
                    statusText.innerText = "YOU MUST ALLOW GPS ACCESS.";
                });
            } else {
                statusText.innerText = "GPS NOT SUPPORTED ON THIS DEVICE.";
            }
        });
    </script>

</body>
</html>
